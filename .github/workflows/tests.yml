name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Run weekly, Friday at 7:15 EST.
    - cron: '15 12 * * 5'

jobs:
  tests:
    name: Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            python-version: "3.12"
          - os: ubuntu-24.04
            python-version: "3.13"
          - os: ubuntu-24.04
            python-version: "3.14"
          - os: ubuntu-24.04
            python-version: "3.13t"
          - os: ubuntu-24.04
            python-version: "3.14t"
          - os: macos-14
            python-version: "3.13"
          - os: macos-26
            python-version: "3.13"
          - os: ubuntu-24.04
            python-version: "3.13"
            sanitizers: true
          # - os: macos-26
          #   python-version: "3.13"
          #   sanitizers: true
    env:
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      id: setup-python
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install LLVM
      if: runner.os == 'macOS'
      run: |
        brew install llvm libomp
        echo "CC=$(brew --prefix llvm)/bin/clang" >> $GITHUB_ENV
        echo "CXX=$(brew --prefix llvm)/bin/clang++" >> $GITHUB_ENV
        echo "CFLAGS=-I$(brew --prefix libomp)/include" >> $GITHUB_ENV
        # c++ library path is workaround for clang bug https://github.com/llvm/llvm-project/issues/155531
        echo "LDFLAGS=-L$(brew --prefix libomp)/lib -L"$(brew --prefix llvm)"/lib/c++" >> $GITHUB_ENV
        echo "MACOSX_DEPLOYMENT_TARGET=14" >> $GITHUB_ENV

    - name: Setup Env (Linux)
      if: runner.os == 'Linux'
      run: |
        echo "CC=gcc" >> $GITHUB_ENV
        echo "CXX=g++" >> $GITHUB_ENV

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.11.0"

    - name: Install FFTW (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libfftw3-dev

    - name: Install FFTW (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install fftw

    - name: Setup sanitizers
      if: matrix.sanitizers
      run: |
        echo "SKBUILD_CMAKE_ARGS=-DNIFTY_LS_SANITIZERS=ON" >> $GITHUB_ENV
        echo "SKBUILD_CMAKE_BUILD_TYPE=Debug" >> $GITHUB_ENV
        if [ "$RUNNER_OS" = "Linux" ]; then
          echo "LD_PRELOAD=$($CC -print-file-name=libasan.so):$($CC -print-file-name=libubsan.so)" >> $GITHUB_ENV
        elif [ "$RUNNER_OS" = "macOS" ]; then
          RUNTIME_DIR=$($CC -print-runtime-dir)
          ASAN_DYLIB=$(find "$RUNTIME_DIR" -name 'libclang_rt.asan_osx_dynamic.dylib' 2>/dev/null | head -1)
          echo "DYLD_INSERT_LIBRARIES=$ASAN_DYLIB" >> $GITHUB_ENV
        fi
        echo "ASAN_OPTIONS=halt_on_error=1:detect_leaks=0" >> $GITHUB_ENV
        echo "UBSAN_OPTIONS=halt_on_error=1" >> $GITHUB_ENV
        echo "PYTEST_ADDOPTS=--benchmark-skip" >> $GITHUB_ENV

    - name: Install from source
      run: |
        uv sync \
          -v \
          --no-editable \
          -Ccmake.verbose=true \
          -Ccmake.define.NIFTY_LS_COMPILE_WARNING_AS_ERROR=ON

    - name: Run tests
      run: |
        uv run -v --no-sync pytest -vs

    - name: Run free-threaded tests
      if: endsWith(matrix.python-version, 't')
      env:
        NIFTY_LS_FORCE_FREETHREADED_TEST: 1
      run: |
        # Needs special treatment to only load nogil-compatible packages
        uv run -v --no-dev --exact --group test-freethreaded pytest -xs tests/test_freethreaded.py

    # - name: Setup tmate session
    #   if: ${{ failure() }}
    #   uses: mxschmitt/action-tmate@v3
    #   with:
    #     limit-access-to-actor: true
